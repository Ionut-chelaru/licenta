<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Antrenor Virtual</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #111; color: #eee; height: 100vh; overflow: hidden; }

    /* Navigare de sus */
    nav { background: #1e1e1e; padding: 12px 40px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    nav .utilizator { color: #888; font-size: 0.9rem; }
    nav .btn-nav { text-decoration: none; color: #ccc; font-size: 0.85rem; padding: 6px 12px; border: 1px solid #444; border-radius: 6px; }
    nav .btn-nav:hover { background: #2a2a2a; color: white; }

    /* ── Ecran upload ── */
    #ecran-upload { display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 50px); padding: 40px 20px; }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    p.subtitlu { color: #888; margin-bottom: 24px; }
    .zona-upload { background: #1e1e1e; border: 2px dashed #444; border-radius: 12px; padding: 40px; text-align: center; width: 100%; max-width: 420px; transition: border-color 0.2s; }
    .zona-upload:hover { border-color: #888; }
    .zona-upload input { display: none; }
    .zona-upload label { cursor: pointer; color: #aaa; font-size: 1rem; }
    .zona-upload .nume-fisier { margin-top: 10px; color: #ccc; font-size: 0.9rem; }

    button { margin-top: 20px; padding: 12px 32px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #2563eb; }
    button:disabled { background: #444; cursor: default; }
    #incarcare { margin-top: 20px; color: #888; display: none; }
    #eroare { margin-top: 14px; color: #f87171; font-size: 0.9rem; display: none; max-width: 420px; text-align: center; }

    /* ── Ecran rezultate (split) ── */
    #ecran-rezultat { display: none; height: 100vh; width: 100vw; }
    #ecran-rezultat.vizibil { display: flex; }
    #jumatate-video { width: 50vw; height: 100vh; background: #000; position: relative; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    #jumatate-video video { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
    #jumatate-video canvas { position: absolute; pointer-events: none; }
    #jumatate-rezultate { width: 50vw; height: 100vh; overflow-y: auto; background: #161616; padding: 40px 36px; display: flex; flex-direction: column; gap: 24px; }
    #jumatate-rezultate h2 { font-size: 1.4rem; }
    .stat { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #2a2a2a; }
    .stat span:first-child { color: #888; }
    .stat span:last-child { font-weight: bold; font-size: 1.1rem; }
    .bara-scor-bg { background: #333; border-radius: 8px; height: 14px; overflow: hidden; }
    .bara-scor { height: 100%; border-radius: 8px; background: #3b82f6; transition: width 0.6s ease; }
    .feedback-titlu { color: #888; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .feedback li { list-style: none; padding: 8px 0; border-bottom: 1px solid #2a2a2a; color: #ccc; font-size: 0.95rem; }
    #btn-inapoi { margin-top: auto; background: #2a2a2a; color: #aaa; border: none; border-radius: 8px; padding: 10px 20px; font-size: 0.9rem; cursor: pointer; align-self: flex-start; }
    #btn-inapoi:hover { background: #333; color: white; }
  </style>
</head>
<body>

  <nav>
    <div class="utilizator">Salut, <strong>{{ session['username'] }}</strong></div>
    <div>
      <a href="/istoric" class="btn-nav">Vezi Istoric</a>
      <a href="/logout" class="btn-nav" style="border-color:#553333; color:#f87171;">Ieșire</a>
    </div>
  </nav>

  <div id="ecran-upload">
    <h1>Analiză Formă</h1>
    <p class="subtitlu">Încarcă un video pentru evaluare.</p>
    <div class="zona-upload">
      <input type="file" id="inputFisier" accept="video/*" />
      <label for="inputFisier">Apasă aici pentru a selecta un video</label>
      <div class="nume-fisier" id="numeFisier">Niciun fișier selectat</div>
    </div>
    <button id="btnAnalizeaza" disabled>Analizează Videoclipul</button>
    <div id="incarcare">Se analizează...</div>
    <div id="eroare"></div>
  </div>

  <div id="ecran-rezultat">
    <div id="jumatate-video">
      <video id="videoOriginal" controls></video>
      <canvas id="canvasSchelet"></canvas>
    </div>
    <div id="jumatate-rezultate">
      <h2 id="numeExercitiu">Rezultate</h2>
      <div>
        <div class="stat"><span>Repetări</span><span id="valRepetari">—</span></div>
        <div class="stat"><span>Scor</span><span id="valScor">—</span></div>
        <div class="bara-scor-bg" style="margin-top:12px;"><div class="bara-scor" id="baraScor"></div></div>
      </div>
      <div><p class="feedback-titlu">Feedback</p><ul class="feedback" id="listaFeedback"></ul></div>
      <button id="btn-inapoi">← Înapoi</button>
    </div>
  </div>

  <script>
    const inputFisier = document.getElementById("inputFisier"), numeFisier = document.getElementById("numeFisier"), btnAnalizeaza = document.getElementById("btnAnalizeaza"), incarcare = document.getElementById("incarcare"), eroare = document.getElementById("eroare"), ecranUpload = document.getElementById("ecran-upload"), ecranRezultat = document.getElementById("ecran-rezultat"), video = document.getElementById("videoOriginal"), canvas = document.getElementById("canvasSchelet"), ctx = canvas.getContext("2d");
    let dateAnaliza = null;

    inputFisier.addEventListener("change", () => { if (inputFisier.files.length > 0) { numeFisier.textContent = inputFisier.files[0].name; btnAnalizeaza.disabled = false; } });
    btnAnalizeaza.addEventListener("click", async () => {
      const fisier = inputFisier.files[0]; if (!fisier) return;
      const formData = new FormData(); formData.append("video", fisier);
      btnAnalizeaza.disabled = true; incarcare.style.display = "block"; eroare.style.display = "none";
      try {
        const r = await fetch("/analizeaza", { method: "POST", body: formData });
        const d = await r.json(); incarcare.style.display = "none";
        if (d.eroare) { eroare.textContent = d.eroare; eroare.style.display = "block"; btnAnalizeaza.disabled = false; return; }
        document.getElementById("numeExercitiu").textContent = "Analiză — " + d.exercitiu;
        document.getElementById("valRepetari").textContent = d.repetari; document.getElementById("valScor").textContent = d.scor + "%"; document.getElementById("baraScor").style.width = d.scor + "%";
        const lf = document.getElementById("listaFeedback"); lf.innerHTML = ""; d.feedback.forEach(m => { const li = document.createElement("li"); li.textContent = m; lf.appendChild(li); });
        video.src = URL.createObjectURL(fisier); dateAnaliza = d; ecranUpload.style.display = "none"; document.querySelector("nav").style.display = "none"; ecranRezultat.classList.add("vizibil");
      } catch (e) { incarcare.style.display = "none"; eroare.textContent = "Eroare la server."; eroare.style.display = "block"; btnAnalizeaza.disabled = false; }
    });

    document.getElementById("btn-inapoi").addEventListener("click", () => { ecranRezultat.classList.remove("vizibil"); ecranUpload.style.display = "flex"; document.querySelector("nav").style.display = "flex"; video.src = ""; dateAnaliza = null; ctx.clearRect(0, 0, canvas.width, canvas.height); });

    function actualizeazaDimensiuniCanvas() {
      const vW = video.videoWidth, vH = video.videoHeight, cW = video.clientWidth, cH = video.clientHeight; if (!vW || !vH) return;
      const vR = vW / vH, sR = cW / cH; let fW, fH;
      if (sR > vR) { fH = cH; fW = cH * vR; } else { fW = cW; fH = cW / vR; }
      canvas.width = vW; canvas.height = vH; canvas.style.width = fW + "px"; canvas.style.height = fH + "px";
    }
    video.addEventListener("loadedmetadata", actualizeazaDimensiuniCanvas); window.addEventListener("resize", actualizeazaDimensiuniCanvas);
    video.addEventListener("play", () => { function loop() { if (video.paused || video.ended) return; deseneazaCadruCurent(); requestAnimationFrame(loop); } loop(); });
    function deseneazaCadruCurent() {
      if (!dateAnaliza) return;
      const { cadre, fps, conexiuni } = dateAnaliza; const iC = Math.floor(video.currentTime * fps); const dC = cadre[Math.min(iC, cadre.length - 1)];
      ctx.clearRect(0, 0, canvas.width, canvas.height); if (!dC) return;
      const { lm, ug, us } = dC, w = canvas.width, h = canvas.height;
      let col = "#ff3333"; if (ug < 120) col = "#ffcc00"; if (ug < 100) col = "#00ff88";
      ctx.strokeStyle = col; ctx.lineWidth = 4; ctx.shadowBlur = 10; ctx.shadowColor = col;
      conexiuni.forEach(([i, j]) => { ctx.beginPath(); ctx.moveTo(lm[i][0] * w, lm[i][1] * h); ctx.lineTo(lm[j][0] * w, lm[j][1] * h); ctx.stroke(); });
      ctx.shadowBlur = 0; [11, 23, 25, 27].forEach(i => { ctx.beginPath(); ctx.arc(lm[i][0] * w, lm[i][1] * h, 7, 0, 2 * Math.PI); ctx.fillStyle = "#ffffff"; ctx.fill(); ctx.strokeStyle = col; ctx.stroke(); });
      const gX = lm[25][0] * w, gY = lm[25][1] * h, R = 50;
      ctx.beginPath(); ctx.arc(gX, gY, R, 0, 2 * Math.PI); ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 5; ctx.stroke();
      const p = Math.min(1, Math.max(0, (180 - ug) / 90));
      ctx.beginPath(); ctx.arc(gX, gY, R, -Math.PI/2, -Math.PI/2 + (p * 2 * Math.PI)); ctx.strokeStyle = col; ctx.lineWidth = 8; ctx.stroke();
      deseneazaLabel(ctx, ug + "°", gX + R + 10, gY, col); deseneazaLabel(ctx, us + "° Spate", lm[23][0] * w + R + 10, lm[23][1] * h, "#3b82f6");
    }
    function deseneazaLabel(ctx, t, x, y, c) {
      ctx.font = "bold 36px sans-serif"; const tm = ctx.measureText(t); ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(x - 15, y - 35, tm.width + 30, 50); ctx.fillStyle = c; ctx.fillRect(x - 15, y - 35, 8, 50); ctx.fillStyle = "#ffffff"; ctx.fillText(t, x + 5, y + 5);
    }
  </script>
</body>
</html>
