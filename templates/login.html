<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Login - Antrenor Virtual</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { background: #1e1e1e; padding: 40px; border-radius: 12px; width: 100%; max-width: 360px; text-align: center; border: 1px solid #333; }
    h1 { margin-bottom: 8px; font-size: 1.5rem; }
    p { color: #888; margin-bottom: 24px; font-size: 0.9rem; }
    input { width: 100%; padding: 12px; margin-bottom: 16px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: white; outline: none; }
    input:focus { border-color: #3b82f6; }
    button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    button:hover { background: #2563eb; }
    .eroare { color: #f87171; margin-bottom: 16px; font-size: 0.85rem; }
    .link { margin-top: 20px; font-size: 0.85rem; }
    .link a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>{{ 'Înregistrare' if register else 'Autentificare' }}</h1>
    <p>{{ 'Creează un cont nou' if register else 'Intră în contul tău' }}</p>

    {% if eroare %}<div class="eroare">{{ eroare }}</div>{% endif %}

    <form action="{{ url_for('register' if register else 'login') }}" method="POST">
      <input type="text" name="username" placeholder="Utilizator" required>
      <input type="password" name="password" placeholder="Parolă" required>
      <button type="submit">{{ 'Creează cont' if register else 'Loghează-te' }}</button>
    </form>

    <div class="link">
      {% if register %}
        Ai deja cont? <a href="{{ url_for('login') }}">Loghează-te aici</a>
      {% else %}
        Nu ai cont? <a href="{{ url_for('register') }}">Înregistrează-te aici</a>
      {% endif %}
    </div>
  </div>
</body>
</html>
